<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -10 630 145">
  <defs>
    <radialGradient id="gb" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FF2DA6"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </radialGradient>
    <radialGradient id="gr" cx="35%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#00C8FF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </radialGradient>
    <radialGradient id="hb" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FF2DA6" stop-opacity="0.22"/>
      <stop offset="40%" stop-color="#FF2DA6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FF2DA6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hr" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00C8FF" stop-opacity="0.22"/>
      <stop offset="40%" stop-color="#00C8FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00C8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bet-node" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#FF2DA6" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#A855F7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0A0A12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flash" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-heavy" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="glow-sm" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      @keyframes flyIn {
        0%   { transform: translate(var(--ox), var(--oy)) scale(0.05); opacity: 0; }
        20%  { opacity: 1; }
        100% { transform: translate(0, 0) scale(1); opacity: 1; }
      }
      @keyframes drawLine {
        to { stroke-dashoffset: 0; opacity: 1; }
      }
      @keyframes flashEffect {
        0%   { r: 1; opacity: 0; }
        20%  { opacity: 0.9; }
        100% { r: 24; opacity: 0; }
      }
      @keyframes fadeIn  { to { opacity: 1; } }
      @keyframes letraIn {
        0%   { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes taglineIn {
        0%   { opacity: 0; transform: translateY(6px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      .star        { opacity: 0; animation: flyIn 0.9s cubic-bezier(0.45,0.05,0.55,0.95) forwards; }
      .line-draw   { opacity: 0; animation: drawLine 0.4s ease-out forwards; stroke-dasharray: 150; stroke-dashoffset: 150; }
      .flash-circle{ opacity: 0; animation: flashEffect 0.55s ease-out forwards; }
      .halo        { opacity: 0; animation: fadeIn 0.8s ease-out forwards; }
      .letra       { opacity: 0; animation: letraIn 0.35s ease-out forwards; }
      #tagline     { opacity: 0; animation: taglineIn 0.5s ease-out 4.8s forwards; }

      #s-betelgeuse { --ox: 71px;  --oy: 81px;  animation-delay: 0.0s; transform-origin: 24px 14px;   }
      #s-bellatrix  { --ox:-118px; --oy: 59px;  animation-delay: 0.2s; transform-origin: 88px 26px;   }
      #s-mintaka    { --ox: 41px;  --oy:-55px;  animation-delay: 0.4s; transform-origin: 34px 60px;   }
      #s-alnilam    { --ox:-46px;  --oy:-48px;  animation-delay: 0.6s; transform-origin: 56px 58px;   }
      #s-alnitak    { --ox:-43px;  --oy: 43px;  animation-delay: 0.8s; transform-origin: 78px 52px;   }
      #s-saiph      { --ox: 60px;  --oy:-58px;  animation-delay: 1.0s; transform-origin: 20px 108px;  }
      #s-rigel      { --ox:-95px;  --oy:-45px;  animation-delay: 1.2s; transform-origin: 100px 100px; }

      #fl1 { animation-delay: 0.9s; } #fl2 { animation-delay: 1.1s; }
      #fl3 { animation-delay: 1.3s; } #fl4 { animation-delay: 1.5s; }
      #fl5 { animation-delay: 1.7s; } #fl6 { animation-delay: 1.9s; }
      #fl7 { animation-delay: 2.1s; }

      #halo-betelgeuse  { animation-delay: 0.9s; }
      #halo-betelgeuse2 { animation-delay: 0.9s; }
      #halo-rigel       { animation-delay: 2.1s; }
      #halo-rigel2      { animation-delay: 2.1s; }

      #l1 { animation-delay: 2.30s; } #l2 { animation-delay: 2.43s; }
      #l3 { animation-delay: 2.56s; } #l4 { animation-delay: 2.69s; }
      #l5 { animation-delay: 2.82s; } #l6 { animation-delay: 2.95s; }
      #l7 { animation-delay: 3.08s; }
      #l8 { animation-delay: 3.21s; stroke-dasharray: 3,4; stroke-dashoffset: 0; }

      #lt1 { animation-delay: 3.7s;  } #lt2 { animation-delay: 3.83s; }
      #lt3 { animation-delay: 3.96s; } #lt4 { animation-delay: 4.09s; }
      #lt5 { animation-delay: 4.22s; } #lt6 { animation-delay: 4.35s; }
      #lt7 { animation-delay: 4.48s; }
    </style>
  </defs>

  <!-- Halos -->
  <circle id="halo-betelgeuse"  class="halo" cx="24"  cy="14"  r="38" fill="url(#hb)" filter="url(#blur-heavy)"/>
  <circle id="halo-betelgeuse2" class="halo" cx="24"  cy="14"  r="18" fill="#0A0A12" filter="url(#blur-heavy)"/>
  <circle id="halo-rigel"       class="halo" cx="100" cy="100" r="38" fill="url(#hr)" filter="url(#blur-heavy)"/>
  <circle id="halo-rigel2"      class="halo" cx="100" cy="100" r="18" fill="#0A0A12" filter="url(#blur-heavy)"/>

  <!-- Líneas — todas nítidas, sin filtro -->
  <line id="l1" class="line-draw" x1="24"  y1="14"  x2="88"  y2="26"  stroke="#A855F7" stroke-width="1.2" stroke-linecap="round"/>
  <line id="l2" class="line-draw" x1="24"  y1="14"  x2="34"  y2="60"  stroke="#A855F7" stroke-width="1.2" stroke-linecap="round"/>
  <line id="l3" class="line-draw" x1="88"  y1="26"  x2="78"  y2="52"  stroke="#A855F7" stroke-width="1.2" stroke-linecap="round"/>
  <line id="l4" class="line-draw" x1="34"  y1="60"  x2="56"  y2="58"  stroke="#00C8FF" stroke-width="2"   stroke-linecap="round"/>
  <line id="l5" class="line-draw" x1="56"  y1="58"  x2="78"  y2="52"  stroke="#00C8FF" stroke-width="2"   stroke-linecap="round"/>
  <line id="l6" class="line-draw" x1="34"  y1="60"  x2="20"  y2="108" stroke="#A855F7" stroke-width="1.2" stroke-linecap="round"/>
  <line id="l7" class="line-draw" x1="78"  y1="52"  x2="100" y2="100" stroke="#A855F7" stroke-width="1.2" stroke-linecap="round"/>
  <line id="l8" class="line-draw" x1="20"  y1="108" x2="100" y2="100" stroke="#00C8FF" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Nodos intermedios -->
  <g id="s-bellatrix" class="star"><circle cx="88"  cy="26"  r="7"  fill="#A855F7"/></g>
  <g id="s-mintaka"   class="star"><circle cx="34"  cy="60"  r="5"  fill="#00C8FF"/></g>
  <g id="s-alnilam"   class="star"><circle cx="56"  cy="58"  r="5"  fill="#00C8FF"/></g>
  <g id="s-alnitak"   class="star"><circle cx="78"  cy="52"  r="5"  fill="#00C8FF"/></g>
  <g id="s-saiph"     class="star"><circle cx="20"  cy="108" r="6"  fill="#A855F7"/></g>

  <!-- Betelgeuse -->
  <g id="s-betelgeuse" class="star">
    <circle cx="24" cy="14" r="9" fill="#0A0A12"/>
    <circle cx="24" cy="14" r="9" fill="url(#bet-node)" filter="url(#glow-sm)"/>
  </g>

  <!-- Rigel con S centrada -->
  <g id="s-rigel" class="star" filter="url(#glow-sm)">
    <circle cx="100" cy="100" r="8" fill="url(#gr)" opacity="0.75"/>
    <circle cx="100" cy="100" r="8" fill="none" stroke="#0A0A12" stroke-width="0.5"/>
    <text x="100" y="100" text-anchor="middle" dominant-baseline="central"
      font-family="Georgia,serif" font-size="9" font-weight="700" fill="#0A0A12">S</text>
  </g>

  <!-- Flashes -->
  <circle id="fl1" class="flash-circle" cx="24"  cy="14"  r="1" fill="url(#flash)"/>
  <circle id="fl2" class="flash-circle" cx="88"  cy="26"  r="1" fill="url(#flash)"/>
  <circle id="fl3" class="flash-circle" cx="34"  cy="60"  r="1" fill="url(#flash)"/>
  <circle id="fl4" class="flash-circle" cx="56"  cy="58"  r="1" fill="url(#flash)"/>
  <circle id="fl5" class="flash-circle" cx="78"  cy="52"  r="1" fill="url(#flash)"/>
  <circle id="fl6" class="flash-circle" cx="20"  cy="108" r="1" fill="url(#flash)"/>
  <circle id="fl7" class="flash-circle" cx="100" cy="100" r="1" fill="url(#flash)"/>

  <!-- SILABOS letra a letra — mismo estilo que el banner original azul -->
  <text font-family="Georgia,'Times New Roman',serif" font-size="72" font-weight="700">
    <tspan id="lt1" class="letra" x="136" y="88" fill="#FF2DA6">S</tspan>
    <tspan id="lt2" class="letra" fill="#FF2DA6">I</tspan>
    <tspan id="lt3" class="letra" fill="#A855F7">L</tspan>
    <tspan id="lt4" class="letra" fill="#A855F7">A</tspan>
    <tspan id="lt5" class="letra" fill="#A855F7">B</tspan>
    <tspan id="lt6" class="letra" fill="#00C8FF">O</tspan>
    <tspan id="lt7" class="letra" fill="#00C8FF">S</tspan>
  </text>

  <!-- Tagline -->
  <text id="tagline" x="137" y="116"
    font-family="Arial,sans-serif" font-size="11"
    fill="rgba(255,255,255,0.4)" letter-spacing="3.5">
    PEDAGOGÍA · IA · ELE
  </text>

</svg>
